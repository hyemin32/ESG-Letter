name: Daily ESG Letter

# 평일(월~금) 오전 7시 KST = 전날 22:00 UTC 에 실행
on:
  schedule:
    - cron: "0 22 * * 0-4"   # UTC 일~목 22:00 = KST 월~금 07:00
  workflow_dispatch:          # 버튼으로 수동 실행도 가능

# 아카이브/뉴스레터를 저장소에 커밋해야 하므로 쓰기 권한 필요
permissions:
  contents: write

concurrency:
  group: esg-letter
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 뉴스레터 생성 및 발송
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
        run: python main.py

      - name: 결과 커밋 (뉴스레터 + 아카이브)
        run: |
          git config user.name "esg-letter-bot"
          git config user.email "actions@github.com"
          git add docs archive
          if git diff --staged --quiet; then
            echo "변경 사항 없음"
          else
            git commit -m "ESG 레터 자동 발행 $(date -u +%Y-%m-%d)"
            git push
          fi
